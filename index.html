<!DOCTYPE html>
<html lang="ja">

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA設定 -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#6a0dad">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icon-128.png" type="image/png">
  <title>二次方程式計算サイト - 解の公式で瞬時に解ける無料ツール</title>
  <meta name="description" content="二次方程式 ax²+bx+c=0 を入力すると、解の公式（quadratic formula）で解を自動計算できる無料の学習用ツールです。">
  <meta name="google-site-verification" content="hARcy-8F8DbN-92hdXJ_NU-zU_vVCxl2rWL6gRUyXsw" />
</head>

<body>
  <div>
    <h1>
      別にあんたのための計算サイトじゃないんだからねっ！
    </h1>
  </div>
  <div>
    <h1>
      <math>
        <mi>a</mi>
        <msup>
          <mi>x</mi>
          <mn>2</mn>
        </msup>
        <mo>+</mo>
        <mi>b</mi>
        <mi>x</mi>
        <mo>+</mo>
        <mi>c</mi>
        <mo>=</mo>
        <mn>0</mn>
      </math>
    </h1>
  </div>
  <div>
    <h1>
      さぁ、ほらっ！適当な数字を入力しなさいよっ！
    </h1>
  </div>
  <div>
    <h1 id="answer">
    </h1>
  </div>
  <div>
    <h1>
      <label for="a">a:</label>
      <input type="number" autocomplete="number" id="a" size="100" value="" placeholder="さぁ、ほらっ！aを入力しなさいよっ！">
    </h1>
  </div>
  <div>
    <h1>
      <label for="a">b:</label>
      <input type="number" autocomplete="number" id="b" size="100" value="" placeholder="さぁ、ほらっ！bを入力しなさいよっ！">
    </h1>
  </div>
  <div>
    <h1>
      <label for="a">c:</label>
      <input type="number" autocomplete="number" id="c" size="100" value="" placeholder="さぁ、ほらっ！cを入力しなさいよっ！">
    </h1>
  </div>
  <div>
    <h1>
      <input type="button" id="btn_submit" value="計算">
    </h1>
  </div>
  <div>
    <h1>
      <input type="button" id="clear" value="クリア">
    </h1>
  </div>
  <script src="script.js"></script>
  <script src="https://fred-wang.github.io/mathml-warning.js/mpadded-min.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW登録成功'))
      .catch(err => console.log('SW登録失敗', err));
  }
  </script>
</body>

</html>
